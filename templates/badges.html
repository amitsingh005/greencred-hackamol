{% extends 'base.html' %}
{% block title %}Badges — GreenCred{% endblock %}

{% block content %}
<div id="badge-content">
    <!-- Dynamic: either badge list or badge certificate -->
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const user = requireAuth();
    if (!user) return;

    const params = new URLSearchParams(window.location.search);
    const badgeId = params.get('id');
    const content = document.getElementById('badge-content');

    if (badgeId) {
        // Single badge credential/certificate view
        await showBadgeCertificate(badgeId);
    } else {
        // All badges gallery
        await showBadgesGallery();
    }

    async function showBadgesGallery() {
        content.innerHTML = `
            <div class="page-header">
                <div>
                    <h1 class="page-title">🎖️ Badge Gallery</h1>
                    <p class="page-subtitle">Earn badges by completing eco actions and challenges</p>
                </div>
            </div>
            <div id="badges-gallery" class="badge-gallery-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;">
                <div class="skeleton" style="height:200px;border-radius:16px;"></div>
                <div class="skeleton" style="height:200px;border-radius:16px;"></div>
                <div class="skeleton" style="height:200px;border-radius:16px;"></div>
                <div class="skeleton" style="height:200px;border-radius:16px;"></div>
            </div>`;

        try {
            const data = await getBadges();
            const earned = user.badges || [];
            const galleryEl = document.getElementById('badges-gallery');

            galleryEl.innerHTML = data.badges.map(b => {
                const hasEarned = earned.includes(b.badge_id);
                return `
                <div class="card" style="padding:28px;text-align:center;cursor:${hasEarned?'pointer':'default'};opacity:${hasEarned?1:0.55};transition:var(--transition);"
                    onclick="${hasEarned ? `window.location='/badges/?id=${b.badge_id}'` : ''}"
                    onmouseover="${hasEarned ? "this.style.transform='translateY(-4px)';this.style.boxShadow='var(--shadow-lg)'" : ''}"
                    onmouseout="${hasEarned ? "this.style.transform='';this.style.boxShadow=''" : ''}">
                    <div style="font-size:3.5rem;margin-bottom:12px;filter:${hasEarned?'none':'grayscale(100%)'};">${b.emoji}</div>
                    <div style="font-weight:800;font-size:1rem;color:var(--text-dark);margin-bottom:6px;">${b.name}</div>
                    <p style="font-size:0.78rem;color:var(--text-muted);line-height:1.5;margin-bottom:10px;">${b.description}</p>
                    <div style="font-size:0.72rem;padding:4px 10px;background:var(--surface);border-radius:20px;color:var(--text-muted);display:inline-block;">${b.criteria}</div>
                    ${hasEarned ? '<div style="margin-top:10px;"><span class="pill pill-tree_planting">✓ Earned</span></div>' : '<div style="margin-top:10px;"><span style="font-size:0.72rem;color:var(--text-muted);">🔒 Locked</span></div>'}
                    ${hasEarned ? `<div style="margin-top:8px;font-size:0.75rem;color:var(--primary);font-weight:600;">👥 ${b.earners.length} earned</div>` : ''}
                </div>`;
            }).join('');
        } catch (err) {
            document.getElementById('badges-gallery').innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);">Could not load badges.</div>`;
        }
    }

    async function showBadgeCertificate(badgeId) {
        content.innerHTML = `
            <div style="margin-bottom:16px;"><a href="/badges/" style="color:var(--primary);font-weight:600;font-size:0.9rem;">← All Badges</a></div>
            <div class="skeleton" style="height:400px;border-radius:24px;max-width:500px;margin:0 auto;"></div>`;

        try {
            const data = await getBadge(badgeId);
            const b = data.badge;
            const earned = user.badges || [];
            const hasEarned = earned.includes(b.badge_id);

            // Find when user earned it (approximate)
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });

            content.innerHTML = `
                <div style="margin-bottom:20px;"><a href="/badges/" style="color:var(--primary);font-weight:600;font-size:0.9rem;">← All Badges</a></div>

                <div class="certificate-card" id="certificate-print">
                    <!-- Decorative background -->
                    <div style="position:absolute;inset:0;opacity:0.03;background:repeating-linear-gradient(45deg,var(--primary),var(--primary) 1px,transparent 1px,transparent 20px);pointer-events:none;"></div>

                    <div style="position:relative;">
                        <!-- GreenCred Header -->
                        <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;">
                            <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--primary),#10b981);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;">🌿</div>
                            <span style="font-weight:800;font-size:1rem;color:var(--text-dark);">GreenCred</span>
                        </div>

                        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:8px;">Certificate of Achievement</div>

                        <div class="certificate-emoji">${b.emoji}</div>
                        <div class="certificate-badge-name">${b.name}</div>

                        <p style="color:var(--text-muted);font-size:0.9rem;margin:12px 0 20px;">
                            This certifies that<br>
                            <strong style="color:var(--text-dark);font-size:1.1rem;">${user.display_name}</strong><br>
                            has earned this badge by: <em>${b.criteria}</em>
                        </p>

                        <div style="background:var(--surface);border-radius:var(--radius-md);padding:12px;margin-bottom:20px;">
                            <div style="font-size:0.8rem;color:var(--text-muted);">${b.description}</div>
                        </div>

                        <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-muted);margin-bottom:20px;flex-wrap:wrap;gap:8px;">
                            <span>📅 Issued: ${dateStr}</span>
                            <span>🏛️ Issued by: GreenCred Platform</span>
                        </div>

                        ${b.earners.length > 0 ? `
                        <div style="border-top:1px solid var(--border-light);padding-top:16px;">
                            <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:10px;font-weight:600;">Also earned by:</div>
                            <div class="earners-list">
                                ${b.earners.slice(0,6).map(e => `
                                <div class="earner-chip">
                                    <img class="earner-avatar" src="${e.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(e.display_name)}&background=166534&color=fff&size=48`}" alt="${e.display_name}"
                                         onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(e.display_name)}&background=166534&color=fff&size=48'">
                                    ${e.display_name}
                                </div>`).join('')}
                                ${b.earners.length > 6 ? `<div class="earner-chip">+${b.earners.length - 6} more</div>` : ''}
                            </div>
                        </div>` : ''}
                    </div>
                </div>

                <!-- Action Buttons -->
                <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="shareLinkedIn()">
                        💼 Share on LinkedIn
                    </button>
                    <button class="btn btn-outline" onclick="window.print()">
                        🖨️ Download Certificate
                    </button>
                    <button class="btn btn-ghost" onclick="copyBadgeUrl()">
                        🔗 Copy Link
                    </button>
                </div>`;

            document.title = `${b.name} Badge — GreenCred`;

        } catch (err) {
            content.innerHTML = `<div class="empty-state card"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Badge not found</div><a href="/badges/" class="btn btn-primary">← All Badges</a></div>`;
        }
    }

    window.shareLinkedIn = function() {
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(`I earned the ${document.querySelector('.certificate-badge-name')?.textContent || 'GreenCred'} badge on @GreenCred — the platform for tracking eco actions! 🌍🌿`);
        window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}&summary=${text}`, '_blank');
    };

    window.copyBadgeUrl = function() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            showToast('Badge URL copied!', 'success');
        });
    };
});
</script>

<style>
@media print {
    .sidebar, .mobile-nav, .main-content > *:not(#badge-content),
    a[href="/badges/"], div[style*="display:flex;gap:12px"] { display: none !important; }
    .sidebar, .main-content { margin: 0; padding: 0; }
    .certificate-card { box-shadow: none; border: 2px solid #333; max-width: 100%; }
}
</style>
{% endblock %}
